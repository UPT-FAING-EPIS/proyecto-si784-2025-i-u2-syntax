name: PHPUnit Test Coverage Report

on:
  push:
    branches:
      - main

jobs:
  phpunit-test-coverage:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del código
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Set up PHP con Xdebug
      - name: Set up PHP with Xdebug
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, intl, xdebug

      # 3. Instalar dependencias Composer
      - name: Install PHP dependencies
        working-directory: web_ams
        run: composer install --no-progress --prefer-dist

      # 4. Ejecutar pruebas con PHPUnit y cobertura
      - name: Run PHPUnit with coverage
        working-directory: web_ams
        run: |
          chmod +x ./vendor/bin/phpunit
          ./vendor/bin/phpunit

      # 5. Verificar si la cobertura fue generada
      - name: Check for coverage output
        run: ls -la web_ams/docs/coverage || echo "Coverage folder not found"

      # 6. Preparar reporte de cobertura para despliegue
      - name: Prepare coverage report for deployment
        run: |
          mkdir -p phpunit-output
          if [ -d "web_ams/docs/coverage" ]; then
            cp -r web_ams/docs/coverage/* phpunit-output/
          else
            echo "No coverage report found"
          fi

      # 7. Desplegar a GitHub Pages
      - name: Deploy PHPUnit Coverage Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: phpunit-output
          publish_branch: gh-pages
          destination_dir: phpunit-coverage
