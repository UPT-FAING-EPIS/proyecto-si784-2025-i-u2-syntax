name: PHP Unit Coverage Report

on:
  push:
    branches:
      - main

jobs:
  phpunit-coverage:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        extensions: mbstring, intl, xdebug, mongodb
        tools: composer, pecl

    - name: Remove conflicting ext-mongodb
      run: sudo rm -f /etc/php/8.1/cli/conf.d/*mongodb.ini

    - name: Install ext-mongodb 1.15.0
      run: sudo pecl install mongodb-1.15.0

    - name: Enable ext-mongodb
      run: echo "extension=mongodb.so" | sudo tee /etc/php/8.1/cli/conf.d/20-mongodb.ini

    - name: Confirm Xdebug mode
      run: php -i | grep xdebug.mode

    - name: Install PHP dependencies
      working-directory: web_ams
      run: composer install --no-progress --prefer-dist

    - name: Ensure PHPUnit is executable
      working-directory: web_ams
      run: chmod +x ./vendor/bin/phpunit

    - name: Create coverage directory if missing
      run: mkdir -p web_ams/docs/coverage

    - name: Run PHPUnit with coverage explicitly
      working-directory: web_ams
      run: ./vendor/bin/phpunit --coverage-html docs/coverage

    - name: List generated coverage files
      run: ls -la web_ams/docs/coverage

    - name: Prepare report for GitHub Pages
      run: |
        mkdir -p phpunit-output
        cp -r web_ams/docs/coverage/* phpunit-output/

    - name: Deploy PHPUnit Coverage to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: phpunit-output
        publish_branch: gh-pages
        destination_dir: phpunit-coverage
