name: Análisis Semgrep

on:
  push:
    branches:
      - main

jobs:
  publish-semgrep-report:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout del código
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Configurar PHP
    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.0'
        extensions: mbstring, intl, mongodb
        coverage: xdebug

    # 3. Instalar dependencias de Composer
    - name: Install PHP dependencies
      working-directory: web_ams
      run: composer install --no-progress --prefer-dist

    # 4. Ejecutar PHPUnit
    - name: Run PHPUnit tests
      working-directory: web_ams
      run: ./vendor/bin/phpunit --testdox

    # 5. Configurar Semgrep con Docker
    - name: Set up Semgrep using Docker
      run: docker pull semgrep/semgrep

    # 6. Ejecutar Semgrep y generar un reporte JSON
    - name: Run Semgrep scan
      working-directory: web_ams
      run: |
        docker run --rm -v $(pwd)/web_ams:/src semgrep/semgrep semgrep scan \
          --config="p/default" --json --output semgrep.json --metrics=off

    # 7. Verificar archivos después de Semgrep
    - name: List files after Semgrep scan
      working-directory: web_ams
      run: ls -la

    # 8. Configurar Python y prospector-html
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install prospector-html
      run: python -m pip install prospector2html

    # 9. Convertir el reporte Semgrep JSON a HTML
    - name: Convert Semgrep results to HTML
      working-directory: web_ams
      run: |
        prospector-html --input semgrep.json --output semgrep-report.html --filter semgrep || true
        ls -la

    # 10. Preparar el reporte para la publicación
    - name: Prepare Semgrep report for deployment
      run: |
        mkdir -p semgrep-output
        cp web_ams/semgrep-report.html semgrep-output/index.html
        ls -la semgrep-output

    # 11. Publicar el reporte en gh-pages
    - name: Deploy Semgrep Report to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: semgrep-output
        publish_branch: gh-pages
        destination_dir: semgrep-report
