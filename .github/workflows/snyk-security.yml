name: Snyk PHP Report Deployment

on:
  push:
    branches:
      - main

jobs:
  snyk-security-analysis:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout del código
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Configurar PHP
    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        tools: composer, pecl
        extensions: mbstring, intl

    # 3. Eliminar y reinstalar la extensión mongodb específica
    - name: Remove and install ext-mongodb 1.15.0
      run: |
        sudo rm -f /etc/php/8.1/cli/conf.d/*mongodb.ini
        sudo pecl uninstall -r mongodb || true
        sudo pecl install mongodb-1.15.0
        echo "extension=mongodb.so" | sudo tee /etc/php/8.1/cli/conf.d/20-mongodb.ini

    # 4. Instalar dependencias PHP
    - name: Install PHP dependencies
      working-directory: web_ams
      run: composer install --no-progress --prefer-dist

    # 5. Configurar Node.js
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '16'

    # 6. Instalar dependencias Node.js si existen
    - name: Install Node.js dependencies
      working-directory: web_ams
      run: |
        if [ -f package.json ]; then
          npm install
        fi

    # 7. Instalar Snyk CLI
    - name: Install Snyk CLI
      run: npm install -g snyk snyk-to-html

    # 8. Autenticar Snyk
    - name: Authenticate Snyk
      run: snyk auth ${{ secrets.SNYK_TOKEN }}

    # 9. Ejecutar análisis de Snyk y guardar en JSON
    - name: Run Snyk analysis
      working-directory: web_ams
      run: snyk test --json > snyk-report.json || true

    # 10. Convertir JSON a HTML
    - name: Convert Snyk JSON to HTML
      working-directory: web_ams
      run: snyk-to-html -i snyk-report.json -o snyk-report.html

    # 11. Preparar reporte para publicación
    - name: Prepare Snyk report for deployment
      run: |
        mkdir -p snyk-output
        cp web_ams/snyk-report.html snyk-output/index.html
        ls -la snyk-output

    # 12. Publicar en GitHub Pages
    - name: Deploy Snyk Report to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: snyk-output
        publish_branch: gh-pages
        destination_dir: snyk-report
